<div class="container mt-5 mb-5">
    <div class="row">
        <div class="col-md-6 mx-auto">
            <form [formGroup]="loginForm" (ngSubmit)="saveData()">
                <div class="row mb-3">
                    <div class="col text-center">
                        <h4>ADMIN LOGIN</h4>
                    </div>
                </div>
                <div *ngIf="status == true" class="alert alert-warning alert-dismissible fade show" role="alert">
                    <strong>{{logfail}}</strong>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" (click)="close()" aria-label="Close"></button>
                </div>
                <div class="row mb-3">
                    <div class="col">
                        <label>Email address</label>
                        <input type="email" class="form-control" formControlName="mail">
                        <div *ngIf="loginForm.get('mail')?.invalid && loginForm.get('mail')?.touched" class="text-danger">
                            <span *ngIf="loginForm.get('mail')?.errors?.['required']"> Please Enter Mail </span>
                            <span *ngIf="loginForm.get('mail')?.errors?.['email']"> Please Enter Valid Mail </span>
                        </div>
                    </div>
                </div>
                <div class="row mb-3">
                    <div class="col">
                        <label>Password</label>
                        <input type="password" class="form-control" formControlName="pass">
                        <div *ngIf="loginForm.get('pass')?.invalid && loginForm.get('pass')?.touched" class="text-danger">
                            <span *ngIf="loginForm.get('pass')?.errors?.['required']"> Please Enter Password </span>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col d-flex justify-content-end">
                        <button type="submit" class="btn btn-primary">LOGIN</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
