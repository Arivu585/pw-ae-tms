<div class="container-fluid">
    <div class="row">
        <div class="col-md-2">
            <app-sidebar></app-sidebar>
        </div>
        <div class="col-md-10 mt-3 mb-3">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a routerLink="/home" class="text-decoration-none">Home</a></li>
                    <li class="breadcrumb-item active" aria-current="page">View Bookings</li>
                </ol>
            </nav>
            <div class="row">
                <div class="col-md-12">
                    <table class="table table-bordered table-hover">
                        <thead>
                            <tr class="text-center">
                                <th>S.No</th>
                                <th>Name</th>
                                <th>Contact</th>
                                <th>Mail</th>
                                <th>Package Name</th>
                                <th>From Date</th>
                                <th>To Date</th>
                                <th>Remarks</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr *ngFor="let row of booking;index as i;">
                                <td class="text-center">{{i+1}}</td>
                                <td>{{row.uname}}</td>
                                <td>{{row.contact}}</td>
                                <td>{{row.mail}}</td>
                                <td>{{row.name}}</td>
                                <td>{{row.fdate | date:'dd-MMM-yyyy' }}</td>
                                <td>{{row.tdate | date:'dd-MMM-yyyy' }}</td>
                                <td>{{row.remarks}}</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
